<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Design</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside id="app-workspace-sidebar" class="app-workspace-sidebar-mount" aria-label="Workspaces"></aside>

    <div class="app-shell-main">
      <header>
        <div class="header-primary">
          <h1 id="site-title">Loading…</h1>
        </div>
        <div class="header-actions">
          <span class="site-meta" id="site-meta"></span>
          <div id="export-bar" class="export-bar"></div>
        </div>
      </header>

      <nav class="tabs" role="tablist">
        <button class="tab active" role="tab" data-mode="design" aria-selected="true">Design</button>
        <button class="tab" role="tab" data-mode="edit" aria-selected="false">Workspace</button>
      </nav>

      <main>
        <section id="panel-design" class="panel active" data-mode="design" role="tabpanel">
          <div id="design-mount" class="design-mount"></div>
        </section>

        <section id="panel-edit" class="panel" data-mode="edit" role="tabpanel">
          <div class="workspace-layout">
            <div class="workspace-main">
              <div class="workspace-toolbar">
                <div id="workspace-picker" class="workspace-picker-mount"></div>
                <nav id="view-tabs" class="view-tabs" role="tablist"></nav>
                <button type="button" id="customize-btn" class="btn btn-sm" title="Customize this tab">Customize</button>
              </div>
              <div id="view-mount" class="view-mount"></div>
            </div>
            <aside id="customize-panel" class="customize-panel" hidden></aside>
          </div>
        </section>

        <p class="status" id="load-status">Loading schema…</p>
      </main>
    </div>
  </div>

  <script type="module">
    import("/static/js/editor.js?v=5").catch((err) => {
      const status = document.getElementById("load-status");
      if (status) {
        status.textContent = "Failed to load app: " + (err?.message || err);
        status.classList.add("error");
      }
      console.error(err);
    });
  </script>
</body>
</html>
