<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Design</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body data-density="compact">
  <div class="app-shell">
    <aside id="app-workspace-sidebar" class="app-workspace-sidebar-mount" aria-label="Workspaces"></aside>

    <div class="app-shell-main">
      <header class="app-topbar">
        <div class="header-primary">
          <h1 id="site-title" title="">Loading…</h1>
        </div>
        <nav class="tabs header-tabs" role="tablist" aria-label="Editor mode">
          <button class="tab active" role="tab" data-mode="design" aria-selected="true">Design</button>
          <button class="tab" role="tab" data-mode="edit" aria-selected="false">Workspace</button>
        </nav>
        <div class="header-actions">
          <span class="site-meta visually-hidden" id="site-meta"></span>
          <div id="auth-user" class="auth-user-mount"></div>
          <div id="export-bar" class="export-bar"></div>
        </div>
      </header>

      <main>
        <section id="panel-design" class="panel active" data-mode="design" role="tabpanel">
          <div id="design-mount" class="design-mount"></div>
        </section>

        <section id="panel-edit" class="panel" data-mode="edit" role="tabpanel">
          <div class="workspace-layout">
            <div class="workspace-main">
              <div class="workspace-toolbar">
                <div id="workspace-picker" class="workspace-picker-mount"></div>
                <nav id="view-tabs" class="view-tabs" role="tablist"></nav>
                <button type="button" id="customize-btn" class="btn btn-sm" title="Customize this tab">Customize</button>
              </div>
              <div id="view-mount" class="view-mount"></div>
            </div>
            <aside id="customize-panel" class="customize-panel" hidden></aside>
          </div>
        </section>

        <p class="status" id="load-status">Loading schema…</p>
      </main>
    </div>
  </div>

  <script type="module">
    import {
      initAuth,
      installAuthenticatedFetch,
      mountLoginGate,
      mountUserChip,
    } from "/static/js/auth-client.js?v=3";

    const status = document.getElementById("load-status");
    if (status) status.textContent = "Checking sign-in…";

    async function bootApp() {
      mountUserChip({
        mount: document.getElementById("auth-user"),
        onSignedOut: () => window.location.reload(),
      });
      if (status) status.textContent = "Loading schema…";
      import("/static/js/editor.js?v=11").catch((err) => {
        if (status) {
          status.textContent = "Failed to load app: " + (err?.message || err);
          status.classList.add("error");
        }
        console.error(err);
      });
    }

    try {
      const { enabled, user } = await initAuth();
      installAuthenticatedFetch();
      if (enabled && !user) {
        if (status) status.textContent = "Sign in to continue";
        mountLoginGate({
          onAuthenticated: () => {
            if (status) status.textContent = "Loading schema…";
            bootApp();
          },
        });
      } else {
        bootApp();
      }
    } catch (err) {
      if (status) {
        status.textContent = "Auth failed: " + (err?.message || err);
        status.classList.add("error");
      }
      console.error(err);
    }
  </script>
</body>
</html>
